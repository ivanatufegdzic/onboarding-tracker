<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenerField Onboarding Tracker</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="nav-root"></div>
    <main>
      <div id="overdue-alert"></div>

      <div class="section">
        <h2>Progress by Cohort &amp; Hire</h2>
        <div id="hire-progress-container"></div>
      </div>

      <div class="section">
        <h2>Checklist Progress — All Hires</h2>
        <div id="checklist-progress"></div>
      </div>

      <div class="section">
        <h2>Active Cohorts</h2>
        <div id="cohorts-container" class="grid-2"></div>
      </div>

      <div class="section">
        <h2>Individual Hires</h2>
        <div id="hires-container" class="grid-2"></div>
      </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
