<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cohort - GreenerField Onboarding</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="nav-root"></div>
    <main>
      <div class="breadcrumb">
        <a href="/">Dashboard</a>
        <span>&gt;</span>
        <span id="cohort-name-breadcrumb"></span>
      </div>

      <div class="card mb-lg">
        <div class="card-header">
          <div>
            <h2 id="cohort-name" style="margin: 0;"></h2>
            <p class="text-small text-muted mt-md" id="cohort-info"></p>
          </div>
          <div style="display: flex; gap: 8px;">
            <button onclick="window.open(`/report.html?type=cohort&id=${getQueryParam('id')}`, '_blank')" class="button button-secondary button-small">
              📄 Export Report
            </button>
            <button onclick="openDeleteConfirm('cohort')" class="button button-secondary button-small" style="color: #dc2626;">
              🗑️ Delete
            </button>
          </div>
        </div>
      </div>

      <!-- Delete Confirmation Modal -->
      <div id="delete-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; flex-items: center; justify-content: center;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 8px; padding: 24px; max-width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.15);">
          <h2 style="margin: 0 0 12px 0; color: #dc2626;">Delete Cohort?</h2>
          <p style="margin: 0 0 24px 0; color: #666;">Are you sure you want to delete this cohort and all its hires? This cannot be undone.</p>
          <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button onclick="closeDeleteConfirm()" class="button button-secondary">Cancel</button>
            <button onclick="confirmDelete('cohort')" class="button" style="background-color: #dc2626;">Delete</button>
          </div>
        </div>
      </div>

      <div id="owner-summary" class="card mb-lg"></div>

      <div class="section">
        <h2>Tasks</h2>
        <div id="tasks-container"></div>
      </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/cohort.js"></script>
  </body>
</html>
