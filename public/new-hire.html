<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Hire - GreenerField Onboarding</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="nav-root"></div>
    <main>
      <div class="breadcrumb">
        <a href="/">Dashboard</a>
        <span>&gt;</span>
        <span>New Individual Hire</span>
      </div>

      <div class="card" style="max-width: 600px;">
        <h2>Create New Individual Hire</h2>
        <form id="hire-form">
          <div class="form-group">
            <label for="name">Hire Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required />
          </div>

          <div class="form-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" name="startDate" required />
          </div>

          <div class="flex gap-md">
            <button type="submit" class="button-primary">Create Hire</button>
            <a href="/" class="button button-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/new-hire.js"></script>
  </body>
</html>
