<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Cohort - GreenerField Onboarding</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="nav-root"></div>
    <main>
      <div class="breadcrumb">
        <a href="/">Dashboard</a>
        <span>&gt;</span>
        <span>New Cohort</span>
      </div>

      <div class="card" style="max-width: 600px;">
        <h2>Create New Cohort</h2>
        <form id="cohort-form">
          <div class="form-group">
            <label for="name">Cohort Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. May 2026 Class" required />
          </div>

          <div class="form-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" name="startDate" required />
          </div>

          <div class="form-group">
            <label for="hires">Hire Names (one per line)</label>
            <textarea
              id="hires"
              name="hires"
              placeholder="John Doe&#10;Jane Smith&#10;Bob Johnson"
              required
            ></textarea>
          </div>

          <div class="flex gap-md">
            <button type="submit" class="button-primary">Create Cohort</button>
            <a href="/" class="button button-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/new-cohort.js"></script>
  </body>
</html>
